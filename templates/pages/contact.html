{% extends 'base.html' %}

{% block title %}Contact Us - SkillCore{% endblock %}

{% block content %}
<div class="bg-slate-50 dark:bg-slate-900 min-h-screen py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
    <div class="max-w-md w-full mx-auto space-y-8">
        <div class="text-center">
            <h2 class="mt-6 text-3xl font-extrabold text-primary">Contact SkillCore</h2>
            <p class="mt-2 text-sm text-secondary dark:text-slate-400">
                Have questions or feedback? We'd love to hear from you.
            </p>
        </div>

        <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-card transition-colors duration-300">
            <form class="space-y-6" action="#" method="POST">
                {% csrf_token %}

                <div>
                    <label for="name" class="block text-sm font-medium text-secondary dark:text-slate-300 mb-1">Name</label>
                    <input type="text" name="name" id="name" required
                        class="appearance-none block w-full px-3 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors duration-300">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-secondary dark:text-slate-300 mb-1">Email</label>
                    <input type="email" name="email" id="email" required
                        class="appearance-none block w-full px-3 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors duration-300">
                </div>

                <div>
                    <label for="message" class="block text-sm font-medium text-secondary dark:text-slate-300 mb-1">Message</label>
                    <textarea id="message" name="message" rows="4" required
                        class="appearance-none block w-full px-3 py-2 border border-slate-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg shadow-sm placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm transition-colors duration-300"></textarea>
                </div>

                <div>
                    <button type="button" onclick="alert('Thank you for your message! This is a demo form.')"
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-medium text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                        Send Message
                    </button>
                    <!-- In a real implementation, this button would submit the form -->
                </div>
            </form>

            <div class="mt-6 border-t border-slate-100 dark:border-slate-700 pt-6 text-center text-sm text-secondary dark:text-slate-400 transition-colors duration-300">
                <p>For shop inquiries: <a href="mailto:partners@skillcore.se"
                        class="font-medium text-primary hover:text-primary-hover">partners@skillcore.se</a></p>
                <p class="mt-2">General support: <a href="mailto:support@skillcore.se"
                        class="font-medium text-primary hover:text-primary-hover">support@skillcore.se</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
