{% extends 'base.html' %}

{% block title %}Add Price - SkillCore{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const brandSelect = document.getElementById('brand');
        const modelSelect = document.getElementById('model');

        brandSelect.addEventListener('change', function () {
            const brandId = this.value;

            if (!brandId) {
                modelSelect.innerHTML = '<option value="">Select Brand First</option>';
                modelSelect.disabled = true;
                return;
            }

            modelSelect.disabled = true;
            modelSelect.innerHTML = '<option>Loading...</option>';

            fetch(`{% url 'phones:get_models' %}?brand=${brandId}`)
                .then(response => response.json())
                .then(data => {
                    modelSelect.innerHTML = '<option value="">Select Model</option>';
                    data.models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model.id;
                        option.textContent = model.name;
                        modelSelect.appendChild(option);
                    });
                    modelSelect.disabled = false;
                })
                .catch(error => {
                    console.error('Error fetching models:', error);
                    modelSelect.innerHTML = '<option value="">Error loading models</option>';
                });
        });
    });
</script>
{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-card">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-primary">
                Add New Price
            </h2>
            <p class="mt-2 text-center text-sm text-secondary">
                List a repair service for a specific device.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{% url 'shops:add_price' %}" method="POST">
            {% csrf_token %}

            <div class="space-y-4">
                <div>
                    <label for="brand" class="block text-sm font-medium text-secondary mb-1">Brand</label>
                    <select id="brand" name="brand" required
                        class="block w-full pl-3 pr-10 py-2 text-base border-slate-300 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md">
                        <option value="">Select Brand</option>
                        {% for brand in brands %}
                        <option value="{{ brand.id }}">{{ brand.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="model" class="block text-sm font-medium text-secondary mb-1">Model</label>
                    <select id="model" name="model" required disabled
                        class="block w-full pl-3 pr-10 py-2 text-base border-slate-300 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md bg-slate-50">
                        <option value="">Select Brand First</option>
                    </select>
                </div>

                <div>
                    <label for="service" class="block text-sm font-medium text-secondary mb-1">Service Type</label>
                    <select id="service" name="service" required
                        class="block w-full pl-3 pr-10 py-2 text-base border-slate-300 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm rounded-md">
                        {% for service in services %}
                        <option value="{{ service.id }}">{{ service.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="price" class="block text-sm font-medium text-secondary mb-1">Price (SEK)</label>
                    <div class="relative rounded-md shadow-sm">
                        <input type="number" name="price" id="price"
                            class="focus:ring-primary focus:border-primary block w-full pl-3 pr-12 sm:text-sm border-slate-300 rounded-md"
                            placeholder="999" required>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span class="text-slate-500 sm:text-sm">kr</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between space-x-4">
                <a href="{% url 'shops:dashboard' %}"
                    class="w-1/2 flex justify-center py-3 px-4 border border-slate-300 text-sm font-medium rounded-xl text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all">
                    Cancel
                </a>
                <button type="submit"
                    class="w-1/2 flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg hover:shadow-primary/40 transition-all">
                    Add Price
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
