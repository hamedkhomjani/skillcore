{% extends 'base.html' %}

{% block title %}Register Shop - SkillCore{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-card">
        <div>
            <div
                class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white font-bold mx-auto text-2xl">
                S</div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-primary">
                Register your Shop
            </h2>
            <p class="mt-2 text-center text-sm text-secondary">
                Join SkillCore and start listing your repair prices.
            </p>
        </div>

        <form class="mt-8 space-y-6" action="{% url 'shops:register' %}" method="POST">
            {% csrf_token %}

            <div class="rounded-md shadow-sm -space-y-px">
                <div class="mb-4">
                    <label for="name" class="block text-sm font-medium text-secondary mb-1">Shop Name</label>
                    <input id="name" name="name" type="text" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-t-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                        placeholder="MobilMaster Stockholm">
                </div>
                <div class="mb-4">
                    <label for="city" class="block text-sm font-medium text-secondary mb-1">City</label>
                    <input id="city" name="city" type="text" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                        placeholder="Stockholm">
                </div>
                <div class="mb-4">
                    <label for="address" class="block text-sm font-medium text-secondary mb-1">Address</label>
                    <input id="address" name="address" type="text" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                        placeholder="Sveavägen 45">
                </div>
                <div class="mb-4">
                    <label for="phone" class="block text-sm font-medium text-secondary mb-1">Phone Number</label>
                    <input id="phone" name="phone" type="tel" required
                        class="appearance-none rounded-none relative block w-full px-3 py-2 border border-slate-300 placeholder-slate-400 text-slate-900 rounded-b-md focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                        placeholder="08-123 45 67">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg hover:shadow-primary/40 transition-all">
                    Register Shop
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
