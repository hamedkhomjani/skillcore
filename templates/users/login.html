{% extends 'base.html' %}

{% block title %}Log In - SkillCore{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-card">
        <div>
            <div
                class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white font-bold mx-auto text-2xl">
                S</div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-primary">
                Sign in to your account
            </h2>
            <p class="mt-2 text-center text-sm text-secondary">
                Or <a href="{% url 'users:signup' %}" class="font-medium text-primary hover:text-primary-hover">create a
                    new account</a>
            </p>
        </div>
        <form class="mt-8 space-y-6" action="{% url 'users:login' %}" method="POST">
            {% csrf_token %}

            {% if form.errors %}
            <div class="rounded-md bg-red-50 p-4 mb-4">
                <div class="flex">
                    <div class="ml-3">
                        <h3 class="text-sm font-medium text-red-800">Login error</h3>
                        <div class="mt-2 text-sm text-red-700">
                            <ul class="list-disc pl-5 space-y-1">
                                <li>Invalid username or password.</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}

            <div class="space-y-4">
                <div>
                    <label for="id_username" class="block text-sm font-medium text-secondary mb-1">Username</label>
                    <input type="text" name="username" id="id_username" required
                        class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-secondary mb-1">Password</label>
                    <input type="password" name="password" id="id_password" required
                        class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-primary focus:border-primary sm:text-sm">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-secondary">
                        Remember me
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-primary-hover">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-lg hover:shadow-primary/40 transition-all">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
